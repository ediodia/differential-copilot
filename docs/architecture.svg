<svg width="680" height="600" viewBox="0 0 680 600" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, Helvetica, Arial, sans-serif">
<title>Differential Co-Pilot architecture diagram</title>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="#444441" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>
<rect width="680" height="600" fill="#ffffff"/>

<!-- Input -->
<rect x="240" y="20" width="200" height="44" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="340" y="47" text-anchor="middle" font-size="14" font-weight="500" fill="#2C2C2A">Synthetic case input</text>
<line x1="340" y1="64" x2="340" y2="100" stroke="#444441" stroke-width="1" marker-end="url(#arrow)"/>

<!-- Security screen -->
<rect x="220" y="100" width="240" height="56" rx="8" fill="#FCEBEB" stroke="#A32D2D" stroke-width="0.5"/>
<text x="340" y="123" text-anchor="middle" font-size="14" font-weight="500" fill="#501313">Pre-LLM security screen</text>
<text x="340" y="143" text-anchor="middle" font-size="12" fill="#791F1F">PII redaction, injection block</text>
<line x1="340" y1="156" x2="340" y2="192" stroke="#444441" stroke-width="1" marker-end="url(#arrow)"/>

<!-- Pipeline container -->
<rect x="60" y="192" width="560" height="280" rx="20" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="80" y="216" font-size="14" font-weight="500" fill="#26215C">Sequential ADK pipeline</text>

<!-- Reasoning agent -->
<rect x="90" y="240" width="500" height="56" rx="10" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text x="340" y="263" text-anchor="middle" font-size="14" font-weight="500" fill="#042C53">Reasoning agent</text>
<text x="340" y="283" text-anchor="middle" font-size="12" fill="#0C447C">Generates broad candidate considerations</text>
<line x1="340" y1="296" x2="340" y2="318" stroke="#444441" stroke-width="1" marker-end="url(#arrow)"/>

<!-- Retrieval agent -->
<rect x="90" y="318" width="500" height="56" rx="10" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text x="340" y="341" text-anchor="middle" font-size="14" font-weight="500" fill="#042C53">Retrieval agent</text>
<text x="340" y="361" text-anchor="middle" font-size="12" fill="#0C447C">Checks considerations against MCP tool</text>

<!-- MCP server -->
<line x1="590" y1="346" x2="640" y2="346" stroke="#444441" stroke-width="1" marker-end="url(#arrow)"/>
<rect x="478" y="392" width="160" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="558" y="415" text-anchor="middle" font-size="14" font-weight="500" fill="#04342C">MCP server</text>
<text x="558" y="435" text-anchor="middle" font-size="12" fill="#085041">Synthetic guidelines</text>
<path d="M640 346 L660 346 L660 420 L640 420" fill="none" stroke="#1D9E75" stroke-width="1" marker-end="url(#arrow)"/>

<line x1="340" y1="374" x2="340" y2="396" stroke="#444441" stroke-width="1" marker-end="url(#arrow)"/>

<!-- Verifier agent -->
<rect x="90" y="396" width="370" height="56" rx="10" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text x="275" y="419" text-anchor="middle" font-size="14" font-weight="500" fill="#042C53">Verifier agent</text>
<text x="275" y="439" text-anchor="middle" font-size="12" fill="#0C447C">Reconciles conflicts, flags omissions</text>

<line x1="275" y1="452" x2="275" y2="488" stroke="#444441" stroke-width="1" marker-end="url(#arrow)"/>

<!-- Output -->
<rect x="155" y="488" width="240" height="56" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text x="275" y="511" text-anchor="middle" font-size="14" font-weight="500" fill="#4A1B0C">Differential expansion</text>
<text x="275" y="531" text-anchor="middle" font-size="12" fill="#712B13">Omissions and conflict notes, not a diagnosis</text>
</svg>
